syntax = "proto3";
package openchain.dex.v1;

option go_package = "github.com/bpupadhyaya/openchain/x/dex/types";

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "openchain/dex/v1/types.proto";

// Query defines the DEX module's gRPC query service.
service Query {
  // Pool returns a liquidity pool by ID.
  rpc Pool(QueryPoolRequest) returns (QueryPoolResponse) {
    option (google.api.http).get = "/openchain/dex/v1/pool/{pool_id}";
  }

  // OrderBook returns the order book for a trading pair.
  rpc OrderBook(QueryOrderBookRequest) returns (QueryOrderBookResponse) {
    option (google.api.http).get = "/openchain/dex/v1/orderbook/{base_denom}/{quote_denom}";
  }

  // Orders returns all orders placed by a specific maker.
  rpc Orders(QueryOrdersRequest) returns (QueryOrdersResponse) {
    option (google.api.http).get = "/openchain/dex/v1/orders/{maker}";
  }
}

// QueryPoolRequest queries a liquidity pool by ID.
message QueryPoolRequest {
  string pool_id = 1;
}

// QueryPoolResponse returns the liquidity pool.
message QueryPoolResponse {
  LiquidityPool pool = 1;
}

// QueryOrderBookRequest queries the order book for a trading pair.
message QueryOrderBookRequest {
  string base_denom  = 1;
  string quote_denom = 2;
}

// QueryOrderBookResponse returns the order book.
message QueryOrderBookResponse {
  repeated LimitOrder buys  = 1 [(gogoproto.nullable) = false];
  repeated LimitOrder sells = 2 [(gogoproto.nullable) = false];
}

// QueryOrdersRequest queries orders for a specific maker.
message QueryOrdersRequest {
  string maker = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// QueryOrdersResponse returns the maker's orders.
message QueryOrdersResponse {
  repeated LimitOrder orders = 1 [(gogoproto.nullable) = false];
}
