syntax = "proto3";
package openchain.dex.v1;

option go_package = "github.com/bpupadhyaya/openchain/x/dex/types";

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "amino/amino.proto";

// Msg defines the DEX module's Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // CreatePool creates a new AMM liquidity pool.
  rpc CreatePool(MsgCreatePool) returns (MsgCreatePoolResponse);

  // Swap executes an AMM swap.
  rpc Swap(MsgSwap) returns (MsgSwapResponse);

  // PlaceLimitOrder places a limit order on the order book.
  rpc PlaceLimitOrder(MsgPlaceLimitOrder) returns (MsgPlaceLimitOrderResponse);

  // CancelOrder cancels an open limit order.
  rpc CancelOrder(MsgCancelOrder) returns (MsgCancelOrderResponse);

  // FillOrder fills an existing limit order.
  rpc FillOrder(MsgFillOrder) returns (MsgFillOrderResponse);

  // CreateAtomicSwapOrder posts a P2P atomic swap order for counterparty matching.
  rpc CreateAtomicSwapOrder(MsgCreateAtomicSwapOrder) returns (MsgCreateAtomicSwapOrderResponse);

  // MatchAtomicSwap accepts an atomic swap order as counterparty.
  rpc MatchAtomicSwap(MsgMatchAtomicSwap) returns (MsgMatchAtomicSwapResponse);
}

// MsgCreatePool creates a new liquidity pool.
message MsgCreatePool {
  option (cosmos.msg.v1.signer) = "creator";
  option (amino.name)           = "openchain/dex/MsgCreatePool";

  string creator  = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string denom_a  = 2;
  string denom_b  = 3;
  int64  amount_a = 4;
  int64  amount_b = 5;
  uint64 fee_rate = 6;
}

// MsgCreatePoolResponse defines the response for MsgCreatePool.
message MsgCreatePoolResponse {
  string pool_id = 1;
}

// MsgSwap executes an AMM swap.
message MsgSwap {
  option (cosmos.msg.v1.signer) = "sender";
  option (amino.name)           = "openchain/dex/MsgSwap";

  string sender       = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string pool_id      = 2;
  string input_denom  = 3;
  int64  input_amount = 4;
  int64  min_output   = 5;
}

// MsgSwapResponse defines the response for MsgSwap.
message MsgSwapResponse {
  int64  output_amount = 1;
  string output_denom  = 2;
}

// MsgPlaceLimitOrder places a limit order.
message MsgPlaceLimitOrder {
  option (cosmos.msg.v1.signer) = "maker";
  option (amino.name)           = "openchain/dex/MsgPlaceLimitOrder";

  string maker       = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string base_denom  = 2;
  string quote_denom = 3;
  uint64 price       = 4;
  int64  amount      = 5;
  bool   is_buy      = 6;
}

// MsgPlaceLimitOrderResponse defines the response for MsgPlaceLimitOrder.
message MsgPlaceLimitOrderResponse {
  string order_id = 1;
}

// MsgCancelOrder cancels an open limit order.
message MsgCancelOrder {
  option (cosmos.msg.v1.signer) = "maker";
  option (amino.name)           = "openchain/dex/MsgCancelOrder";

  string maker    = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string order_id = 2;
}

// MsgCancelOrderResponse defines the response for MsgCancelOrder.
message MsgCancelOrderResponse {}

// MsgFillOrder fills an existing limit order (taker buys from maker).
message MsgFillOrder {
  option (cosmos.msg.v1.signer) = "taker";
  option (amino.name)           = "openchain/dex/MsgFillOrder";

  string taker    = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string order_id = 2;
}

message MsgFillOrderResponse {}

// MsgCreateAtomicSwapOrder — P2P cross-chain atomic swap order.
// Posted to Open Chain for counterparty discovery.
message MsgCreateAtomicSwapOrder {
  option (cosmos.msg.v1.signer) = "initiator";
  option (amino.name)           = "openchain/dex/MsgCreateAtomicSwapOrder";

  string initiator               = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string initiator_source_address = 2;  // BTC/ETH/SOL address on source chain
  string source_chain            = 3;   // bitcoin, ethereum, solana
  string dest_chain              = 4;   // bitcoin, ethereum, solana, cosmos
  string sell_amount             = 5;
  string sell_denom              = 6;
  string buy_amount              = 7;
  string buy_denom               = 8;
  string secret_hash             = 9;   // SHA-256 hash of HTLC secret
  string initiator_timelock      = 10;  // blocks
  string participant_timelock    = 11;  // blocks (shorter than initiator)
}

message MsgCreateAtomicSwapOrderResponse {
  string order_id = 1;
}

// MsgMatchAtomicSwap — Accept an atomic swap order as counterparty.
message MsgMatchAtomicSwap {
  option (cosmos.msg.v1.signer) = "participant";
  option (amino.name)           = "openchain/dex/MsgMatchAtomicSwap";

  string participant         = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string order_id            = 2;
  string participant_address = 3;  // Address on destination chain
}

message MsgMatchAtomicSwapResponse {}
