syntax = "proto3";
package openchain.achievement.v1;

option go_package = "github.com/bpupadhyaya/openchain/x/achievement/types";

// Achievement is a non-transferable (soulbound) token representing a verified
// human development milestone on Open Chain. Achievements are permanently bound
// to the owner's Universal ID and cannot be transferred, sold, or traded.
message Achievement {
  string id           = 1;  // Unique achievement ID
  string uid          = 2;  // Owner's Universal ID (soulbound)
  string milestone_id = 3;  // Reference to the verified milestone
  string channel      = 4;  // Value channel: nurture, education, health, etc.
  string title        = 5;  // Human-readable title
  string description  = 6;  // What was achieved
  int32  level        = 7;  // 1=bronze, 2=silver, 3=gold, 4=platinum, 5=diamond
  int64  minted_at    = 8;  // Block height when minted
  string image_uri    = 9;  // URI to achievement image/badge
  map<string, string> metadata = 10; // Additional key-value data
}

// AchievementLevel defines the tier thresholds for achievements.
enum AchievementLevel {
  ACHIEVEMENT_LEVEL_UNSPECIFIED = 0;
  ACHIEVEMENT_LEVEL_BRONZE     = 1;  // < 10 OTK minted
  ACHIEVEMENT_LEVEL_SILVER     = 2;  // >= 10 OTK minted
  ACHIEVEMENT_LEVEL_GOLD       = 3;  // >= 100 OTK minted
  ACHIEVEMENT_LEVEL_PLATINUM   = 4;  // >= 1,000 OTK minted
  ACHIEVEMENT_LEVEL_DIAMOND    = 5;  // >= 10,000 OTK minted
}

// AchievementStats holds aggregate statistics for a UID's achievements.
message AchievementStats {
  string uid                    = 1;
  int64  total_count            = 2;
  map<string, int64> by_channel = 3;  // Count per channel
  map<int32, int64> by_level    = 4;  // Count per level
  int32  highest_level          = 5;  // Rarest achievement level earned
}

// GenesisState defines the achievement module's genesis state.
message GenesisState {
  repeated Achievement achievements = 1;
}
