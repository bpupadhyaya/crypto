syntax = "proto3";
package openchain.uid.v1;

option go_package = "github.com/bpupadhyaya/openchain/x/uid/types";

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";

// UIDStatus represents the status of a Universal ID.
enum UIDStatus {
  UID_STATUS_UNSPECIFIED = 0;
  UID_STATUS_ACTIVE      = 1;
  UID_STATUS_SUSPENDED   = 2;
  UID_STATUS_REVOKED     = 3;
}

// UniversalID represents a unique human identity on Open Chain.
message UniversalID {
  string    id         = 1;
  string    address    = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  int64     created_at = 3;
  string    proof_hash = 4;
  UIDStatus status     = 5;
  string    guardian   = 6 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// SelectiveDisclosure represents a ZK proof claim.
message SelectiveDisclosure {
  string uid        = 1;
  string claim_type = 2;
  string claim_hash = 3;
  bool   verified   = 4;
  int64  expires_at = 5;
}

// GenesisState defines the UID module's genesis state.
message GenesisState {
  repeated UniversalID uids = 1 [(gogoproto.nullable) = false];
}
