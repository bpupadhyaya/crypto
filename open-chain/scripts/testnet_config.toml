# Open Chain Testnet Configuration
# Apply to each validator node's config/config.toml

[p2p]
# Allow all incoming connections for testnet
allow_duplicate_ip = true
# 6-second block time (matching Human Constitution spec)
max_num_inbound_peers = 50
max_num_outbound_peers = 25
# mDNS discovery for local network testing
addr_book_strict = false

[consensus]
# 6-second block time
timeout_propose = "3s"
timeout_propose_delta = "500ms"
timeout_prevote = "1s"
timeout_prevote_delta = "500ms"
timeout_precommit = "1s"
timeout_precommit_delta = "500ms"
timeout_commit = "6s"

[mempool]
# Large mempool for testnet
max_txs = 10000
max_txs_bytes = 1073741824

[rpc]
# Enable RPC for wallet connections
laddr = "tcp://0.0.0.0:26657"
cors_allowed_origins = ["*"]
cors_allowed_methods = ["HEAD", "GET", "POST"]
cors_allowed_headers = ["Origin", "Accept", "Content-Type", "X-Requested-With"]

[instrumentation]
prometheus = true
prometheus_listen_addr = ":26660"
